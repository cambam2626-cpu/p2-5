<!DOCTYPE html>
<html>
<head>
  <title>Restaurant System</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    h2 {
      margin-top: 0;
      color: #38bdf8;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    pre {
      background: black;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
      height: 200px;
    }

    .full {
      grid-column: span 2;
    }
  </style>
</head>

<body>

<header>🍽️ Restaurant Management System</header>

<div class="container">

  <div class="card">
    <h2>Login</h2>
    <input id="username" value="server2">
    <input id="password" value="pw">
    <button onclick="login()">Login</button>
  </div>

  <div class="card">
    <h2>Create Order</h2>
    <input id="type" placeholder="dine_in or take_out">
    <input id="table" placeholder="table number">
    <input id="guests" placeholder="guests">
    <input id="name" placeholder="name (takeout)">
    <button onclick="createOrder()">Create</button>
  </div>

  <div class="card">
    <h2>Add Item</h2>
    <input id="order_id" placeholder="order id">
    <input id="item" placeholder="item name">
    <input id="qty" placeholder="quantity">
    <input id="seat" placeholder="seat (0 takeout)">
    <button onclick="addItem()">Add</button>
  </div>

  <div class="card">
    <h2>View Order</h2>
    <input id="view_id" placeholder="order id">
    <button onclick="viewOrder()">View</button>
  </div>

  <div class="card full">
    <h2>Output</h2>
    <pre id="output"></pre>
  </div>

</div>

<script>
let token = "";
const BASE = "https://p2-5-lule.onrender.com";

function show(data) {
  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}

async function login() {
  const res = await fetch(BASE + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: document.getElementById("username").value,
      password: document.getElementById("password").value
    })
  });
  const data = await res.json();
  token = data.session_token;
  show(data);
}

async function createOrder() {
  const res = await fetch(BASE + "/orders", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      session_token: token,
      order_type: document.getElementById("type").value,
      table_number: parseInt(document.getElementById("table").value || 0),
      guests: parseInt(document.getElementById("guests").value || 0),
      customer_name: document.getElementById("name").value
    })
  });
  const data = await res.json();
  show(data);
}

async function addItem() {
  const res = await fetch(BASE + "/orders/add-item", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      session_token: token,
      order_id: parseInt(document.getElementById("order_id").value),
      item_name: document.getElementById("item").value,
      quantity: parseInt(document.getElementById("qty").value),
      seat_number: parseInt(document.getElementById("seat").value)
    })
  });
  const data = await res.json();
  show(data);
}

async function viewOrder() {
  const id = document.getElementById("view_id").value;
  const res = await fetch(BASE + "/orders/" + id);
  const data = await res.json();
  show(data);
}
</script>

</body>
</html>
